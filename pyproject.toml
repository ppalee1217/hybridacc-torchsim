[project]
name = "hybridacc_verify"
version = "0.1.0"
description = "Verification tools for HybridAcc"
requires-python = ">=3.8"
dependencies = [
    "numpy",
    "torch",
    "pyyaml",
    "pandas>=2.0.3",
]

[tool.setuptools.packages.find]
where = ["python"]
include = ["hybridacc_verify*", "trace_parser*"]
