# T-GEMM-S3: GEMM Multi Wave, Multi Output Tile — M/K/N tiling
name: test_gemm_s3_m32k64n48
hardware:
  num_clusters: 1
  num_pes: 48
  num_bus: 3
  spm_banks_per_group: 3
  spm_bank_depth: 8192
  dram_base: 0x80000000
tensors:
  A:
    shape: [32, 64]
    dtype: fp16
  B:
    shape: [64, 48]
    dtype: fp16
  C:
    shape: [32, 48]
    dtype: fp16
ops:
  - name: gemm1
    type: gemm
    inputs: [A, B]
    outputs: [C]
