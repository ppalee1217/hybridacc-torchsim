# T-3x3-S1: Conv3x3 Single Wave — basic 3x3 sliding window
name: test_conv3x3_s1_ic4oc16
hardware:
  num_clusters: 1
  num_pes: 48
  num_bus: 3
  spm_banks_per_group: 3
  spm_bank_depth: 8192
  dram_base: 0x80000000
tensors:
  input:
    shape: [1, 6, 6, 4]
    dtype: fp16
    layout: NHWC
  weight:
    shape: [16, 3, 3, 4]
    dtype: fp16
    layout: OIHW
  output:
    shape: [1, 4, 4, 16]
    dtype: fp16
    layout: NHWC
ops:
  - name: conv3x3
    type: conv2d_3x3
    inputs: [input, weight]
    outputs: [output]
    attrs:
      stride: 1
      padding: 0
