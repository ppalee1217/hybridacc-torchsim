name: conv3x3_pad1_relu_h16
hardware:
  num_clusters: 1
  num_pes: 48
  num_bus: 3
  spm_banks_per_group: 3
  spm_bank_depth: 8192
  dram_base: 0x80000000
tensors:
  input:
    shape: [1, 16, 16, 4]
    dtype: fp16
    layout: NHWC
  weight:
    shape: [16, 3, 3, 4]
    dtype: fp16
    layout: OIHW
  output:
    shape: [1, 16, 16, 16]
    dtype: fp16
    layout: NHWC
ops:
  - name: conv1
    type: conv2d_3x3
    inputs: [input, weight]
    outputs: [output]
    attrs:
      stride: 1
      padding: 1
      activation: relu