# Sanity test: conv3x3 with OC=4 (tile_oc=4, out_ch_pack=1)
# Purpose: Verify whether OC=4 works in single-layer mode
name: test_conv3x3_oc4_sanity
hardware:
  num_clusters: 1
  num_pes: 48
  num_bus: 3
  spm_banks_per_group: 3
  spm_bank_depth: 8192
  dram_base: 0x80000000
tensors:
  input:
    shape: [1, 16, 16, 4]
    dtype: fp16
    layout: NHWC
  weight:
    shape: [4, 3, 3, 4]
    dtype: fp16
    layout: OIHW
  output:
    shape: [1, 14, 14, 4]
    dtype: fp16
    layout: NHWC
ops:
  - name: conv1
    type: conv2d_3x3
    inputs: [input, weight]
    outputs: [output]
    attrs:
      stride: 1
      padding: 0
