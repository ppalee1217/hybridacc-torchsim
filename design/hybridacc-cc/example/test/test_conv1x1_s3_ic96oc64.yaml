# T-1x1-S3: Conv1x1 Multi Wave, Multi Output Tile — IC + OC tiling
name: test_conv1x1_s3_ic96oc64
hardware:
  num_clusters: 1
  num_pes: 48
  num_bus: 3
  spm_banks_per_group: 3
  spm_bank_depth: 8192
  dram_base: 0x80000000
tensors:
  input:
    shape: [1, 14, 14, 96]
    dtype: fp16
    layout: NHWC
  weight:
    shape: [64, 1, 1, 96]
    dtype: fp16
    layout: OIHW
  output:
    shape: [1, 14, 14, 64]
    dtype: fp16
    layout: NHWC
ops:
  - name: conv1x1
    type: conv2d_1x1
    inputs: [input, weight]
    outputs: [output]
    attrs:
      stride: 1
      padding: 0
