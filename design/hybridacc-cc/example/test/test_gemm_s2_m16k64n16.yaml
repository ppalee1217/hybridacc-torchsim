# T-GEMM-S2: GEMM Multi Wave, Single Output Tile — K tiling
name: test_gemm_s2_m16k64n16
hardware:
  num_clusters: 1
  num_pes: 48
  num_bus: 3
  spm_banks_per_group: 3
  spm_bank_depth: 8192
  dram_base: 0x80000000
tensors:
  A:
    shape: [16, 64]
    dtype: fp16
  B:
    shape: [64, 16]
    dtype: fp16
  C:
    shape: [16, 16]
    dtype: fp16
ops:
  - name: gemm1
    type: gemm
    inputs: [A, B]
    outputs: [C]
