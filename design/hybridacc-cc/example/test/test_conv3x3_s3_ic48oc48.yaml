# T-3x3-S3: Conv3x3 Multi Wave, Multi Output Tile — IC + OC + spatial tiling
name: test_conv3x3_s3_ic48oc48
hardware:
  num_clusters: 1
  num_pes: 48
  num_bus: 3
  spm_banks_per_group: 3
  spm_bank_depth: 8192
  dram_base: 0x80000000
tensors:
  input:
    shape: [1, 14, 14, 48]
    dtype: fp16
    layout: NHWC
  weight:
    shape: [48, 3, 3, 48]
    dtype: fp16
    layout: OIHW
  output:
    shape: [1, 12, 12, 48]
    dtype: fp16
    layout: NHWC
ops:
  - name: conv3x3
    type: conv2d_3x3
    inputs: [input, weight]
    outputs: [output]
    attrs:
      stride: 1
      padding: 0
