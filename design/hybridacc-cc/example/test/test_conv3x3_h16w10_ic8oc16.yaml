# Match cluster-sim conv_k3c4ich8och16s: H=16 W=10 IC=8 OC=16
name: test_conv3x3_h16w10_ic8oc16
hardware:
  num_clusters: 1
  num_pes: 48
  num_bus: 3
  spm_banks_per_group: 3
  spm_bank_depth: 8192
  dram_base: 0x80000000
tensors:
  input:
    shape: [1, 16, 10, 8]
    dtype: fp16
    layout: NHWC
  weight:
    shape: [16, 3, 3, 8]
    dtype: fp16
    layout: OIHW
  output:
    shape: [1, 14, 8, 16]
    dtype: fp16
    layout: NHWC
ops:
  - name: conv3x3
    type: conv2d_3x3
    inputs: [input, weight]
    outputs: [output]
    attrs:
      stride: 1
      padding: 0
