# 2-Layer Conv3x3: Layer1(IC=4→OC=16) → Layer2(IC=16→OC=16, padding=1)
# Layer 2 consumes Layer 1's raw output directly; the runtime DMA load-pad
# path injects the halo window instead of relying on a pre-materialized canvas.
name: test_conv3x3_2layer_pad1
hardware:
  num_clusters: 1
  num_pes: 48
  num_bus: 3
  spm_banks_per_group: 3
  spm_bank_depth: 8192
  dram_base: 0x80000000
tensors:
  input:
    shape: [1, 16, 16, 4]
    dtype: fp16
    layout: NHWC
  weight1:
    shape: [16, 3, 3, 4]
    dtype: fp16
    layout: OIHW
  mid:
    shape: [1, 14, 14, 16]
    dtype: fp16
    layout: NHWC
  weight2:
    shape: [16, 3, 3, 16]
    dtype: fp16
    layout: OIHW
  output:
    shape: [1, 14, 14, 16]
    dtype: fp16
    layout: NHWC
ops:
  - name: conv1
    type: conv2d_3x3
    inputs: [input, weight1]
    outputs: [mid]
    attrs:
      stride: 1
      padding: 0
  - name: conv2
    type: conv2d_3x3
    inputs: [mid, weight2]
    outputs: [output]
    attrs:
      stride: 1
      padding: 1