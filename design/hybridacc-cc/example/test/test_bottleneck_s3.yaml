# T-BN-S3: Bottleneck (Conv1x1â†’Conv3x3â†’Conv1x1) â€” 3-layer pipeline
# Note: C_in for conv1x1 must be %12==0, C_in for conv3x3 must be %4==0
name: test_bottleneck_s3
hardware:
  num_clusters: 1
  num_pes: 48
  num_bus: 3
  spm_banks_per_group: 3
  spm_bank_depth: 8192
  dram_base: 0x80000000
tensors:
  input:
    shape: [1, 14, 14, 48]
    dtype: fp16
    layout: NHWC
  w_reduce:
    shape: [12, 1, 1, 48]
    dtype: fp16
    layout: OIHW
  mid1:
    shape: [1, 14, 14, 12]
    dtype: fp16
    layout: NHWC
  w_spatial:
    shape: [12, 3, 3, 12]
    dtype: fp16
    layout: OIHW
  mid2:
    shape: [1, 12, 12, 12]
    dtype: fp16
    layout: NHWC
  w_expand:
    shape: [48, 1, 1, 12]
    dtype: fp16
    layout: OIHW
  output:
    shape: [1, 12, 12, 48]
    dtype: fp16
    layout: NHWC
ops:
  - name: reduce
    type: conv2d_1x1
    inputs: [input, w_reduce]
    outputs: [mid1]
    attrs:
      stride: 1
      padding: 0
  - name: spatial
    type: conv2d_3x3
    inputs: [mid1, w_spatial]
    outputs: [mid2]
    attrs:
      stride: 1
      padding: 0
  - name: expand
    type: conv2d_1x1
    inputs: [mid2, w_expand]
    outputs: [output]
    attrs:
      stride: 1
      padding: 0
