# T-1x1-S1: Conv1x1 Single Wave — basic pointwise
name: test_conv1x1_s1_ic12oc16h16
hardware:
  num_clusters: 1
  num_pes: 48
  num_bus: 3
  spm_banks_per_group: 3
  spm_bank_depth: 8192
  dram_base: 0x80000000
tensors:
  input:
    shape: [1, 16, 10, 12]
    dtype: fp16
    layout: NHWC
  weight:
    shape: [16, 1, 1, 12]
    dtype: fp16
    layout: OIHW
  output:
    shape: [1, 16, 10, 16]
    dtype: fp16
    layout: NHWC
ops:
  - name: conv1x1
    type: conv2d_1x1
    inputs: [input, weight]
    outputs: [output]
    attrs:
      stride: 1
      padding: 0
