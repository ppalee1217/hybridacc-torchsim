# T-GEMM-S1: GEMM Single Wave — basic matmul
name: test_gemm_s1_m8k16n16
hardware:
  num_clusters: 1
  num_pes: 48
  num_bus: 3
  spm_banks_per_group: 3
  spm_bank_depth: 8192
  dram_base: 0x80000000
tensors:
  A:
    shape: [8, 16]
    dtype: fp16
  B:
    shape: [16, 16]
    dtype: fp16
  C:
    shape: [8, 16]
    dtype: fp16
ops:
  - name: gemm1
    type: gemm
    inputs: [A, B]
    outputs: [C]
