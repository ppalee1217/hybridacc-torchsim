# T-1x1-S4: Conv1x1 Multi Wave + Multi Bus — IC tiling with 3-bank transport
name: test_conv1x1_s4_ic48oc16h48
hardware:
  num_clusters: 1
  num_pes: 48
  num_bus: 3
  spm_banks_per_group: 3
  spm_bank_depth: 8192
  dram_base: 0x80000000
tensors:
  input:
    shape: [1, 48, 10, 48]
    dtype: fp16
    layout: NHWC
  weight:
    shape: [16, 1, 1, 48]
    dtype: fp16
    layout: OIHW
  output:
    shape: [1, 48, 10, 16]
    dtype: fp16
    layout: NHWC
ops:
  - name: conv1x1
    type: conv2d_1x1
    inputs: [input, weight]
    outputs: [output]
    attrs:
      stride: 1
      padding: 0