# Minimal ICH multi-wave: IC=8 → 2 ic_tiles
name: test_conv3x3_ic8oc16
hardware:
  num_clusters: 1
  num_pes: 48
  num_bus: 3
  spm_banks_per_group: 3
  spm_bank_depth: 8192
  dram_base: 0x80000000
tensors:
  input:
    shape: [1, 6, 6, 8]
    dtype: fp16
    layout: NHWC
  weight:
    shape: [16, 3, 3, 8]
    dtype: fp16
    layout: OIHW
  output:
    shape: [1, 4, 4, 16]
    dtype: fp16
    layout: NHWC
ops:
  - name: conv3x3
    type: conv2d_3x3
    inputs: [input, weight]
    outputs: [output]
    attrs:
      stride: 1
      padding: 0
