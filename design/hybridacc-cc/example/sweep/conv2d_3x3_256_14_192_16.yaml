# HybridAcc-CC Workload: Conv2D 3x3 Example
# Usage: hacc-compile conv2d_3x3_256_14_192_16.yaml -o build/

name: conv2d_3x3_256_14_192_16

hardware:
  num_clusters: 1
  num_pes: 48
  num_bus: 3
  spm_banks_per_group: 3
  spm_bank_depth: 8192
  dram_base: 0x80000000
tensors:
  input:
    shape: [1, 16, 194, 256]
    dtype: fp16
    layout: NHWC
  weight:
    shape: [16, 3, 3, 256]
    dtype: fp16
    layout: OIHW
  output:
    shape: [1, 14, 192, 16]
    dtype: fp16
    layout: NHWC
ops:
  - name: conv1
    type: conv2d_3x3
    inputs: [input, weight]
    outputs: [output]
    attrs:
      stride: 1
      padding: 0
