# HybridAcc-CC Workload: Conv2D 1x1 Example
# Usage: hacc-compile conv2d_1x1_example.yaml -o build/

name: conv2d_1x1_example

hardware:
  num_clusters: 4
  num_pes: 64
  num_bus: 4
  spm_banks_per_group: 3
  spm_bank_depth: 4096
  dram_base: 0x80000000

tensors:
  input:
    shape: [1, 14, 14, 48]
    dtype: fp16
    layout: NHWC
  weight:
    shape: [16, 1, 1, 48]
    dtype: fp16
    layout: OIHW
  output:
    shape: [1, 14, 14, 16]
    dtype: fp16
    layout: NHWC

ops:
  - name: conv1x1
    type: conv2d_1x1
    inputs: [input, weight]
    outputs: [output]
    attrs:
      stride: 1
      padding: 0
