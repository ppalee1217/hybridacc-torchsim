# HybridAcc-CC Workload: GEMM Example
# Usage: hacc-compile gemm_example.yaml -o build/

name: gemm_example

hardware:
  num_clusters: 3
  num_pes: 48
  num_bus: 3
  spm_banks_per_group: 3
  spm_bank_depth: 8192
  dram_base: 0x80000000

tensors:
  A:
    shape: [32, 64]
    dtype: fp16
  B:
    shape: [64, 48]
    dtype: fp16
  C:
    shape: [32, 48]
    dtype: fp16

ops:
  - name: gemm1
    type: gemm
    inputs: [A, B]
    outputs: [C]
