# HybridAcc-CC Workload: GEMM Example
# Usage: hacc-compile gemm_w16.yaml -o build/

name: gemm_w16

hardware:
  num_clusters: 1
  num_pes: 48
  num_bus: 3
  spm_banks_per_group: 3
  spm_bank_depth: 8192
  dram_base: 0x80000000

tensors:
  A:
    shape: [192, 96]
    dtype: fp16
  B:
    shape: [96, 128]
    dtype: fp16
  C:
    shape: [192, 128]
    dtype: fp16

ops:
  - name: gemm1
    type: gemm
    inputs: [A, B]
    outputs: [C]
