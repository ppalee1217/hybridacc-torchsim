# HybridAcc-CC Workload: Conv2D 3x3 — matches SoC simulator defaults
# Hardware: 1 cluster, 3 buses × 16 PEs = 48 PEs, bank_depth=8192
# Usage: hacc-compile conv2d_3x3_sim.yaml -o output/hacc_conv3x3_test_build

name: conv2d_3x3_sim

hardware:
  num_clusters: 1
  num_pes: 48
  num_bus: 3
  spm_banks_per_group: 3
  spm_bank_depth: 8192
  dram_base: 0x80000000

tensors:
  input:
    shape: [1, 16, 16, 4]
    dtype: fp16
    layout: NHWC
  weight:
    shape: [16, 3, 3, 4]
    dtype: fp16
    layout: OIHW
  output:
    shape: [1, 14, 14, 16]
    dtype: fp16
    layout: NHWC

ops:
  - name: conv1
    type: conv2d_3x3
    inputs: [input, weight]
    outputs: [output]
    attrs:
      stride: 1
      padding: 0
